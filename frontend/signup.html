<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - AI Homework Assistant</title>
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>

  <div class="auth-container">

    <h2>Sign Up</h2>
    <p class="subtitle">AI-Powered Homework Assistant</p>

    <div class="input-group">
      <input id="email" type="email" placeholder="Enter your email" autocomplete="email">
    </div>

    <div class="input-group">
      <input id="password" type="password" placeholder="Create password (min 6 chars)" autocomplete="new-password"
        onkeydown="if(event.key==='Enter') signup()">
    </div>

    <p id="authError" style="color: #ff4444; font-size: 14px; margin-top: 10px; text-align: center;"></p>

    <button class="auth-btn" onclick="signup()">Sign Up</button>

    <p class="switch-link">
      Already have an account?
      <a href="login.html">Log In</a>
    </p>

  </div>

  <script src="js/auth.js"></script>

</body>

</html>
